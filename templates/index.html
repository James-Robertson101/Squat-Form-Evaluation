<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squat Analyser</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <main>
    <h1>Squat analyser</h1>

    <div class="upload-card">
      <label for="video-input">Upload your squat video</label>
      <input type="file" id="video-input" accept="video/*">

      <div class="view-toggle">
        <label><input type="radio" name="view" value="side" checked> Side view</label>
        <label><input type="radio" name="view" value="front"> Front view</label>
      </div>

      <button id="analyse-btn" onclick="analyseVideo()">Analyse</button>
      <p id="status-msg"></p>
    </div>

    <div id="results" style="display:none">
      <div id="rep-tabs" class="rep-tabs"></div>
      <div id="summary-bar" class="summary-bar"></div>
      <div id="feedback-cards" class="feedback-cards"></div>
    </div>
  </main>

  <script src="{{ url_for('static', filename='feedback.js') }}"></script>
</body>
</html>
